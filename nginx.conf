server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's internal DNS — resolve upstreams per-request, not at startup
    resolver 127.0.0.11 valid=10s;

    # Proxy DriveManager API routes
    location /api/drive/ {
        set $drive_upstream http://drive_manager:8081;
        proxy_pass $drive_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/cards/ {
        set $drive_upstream http://drive_manager:8081;
        proxy_pass $drive_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy UsersService API routes
    location /api/ {
        set $users_upstream http://users_service:8090;
        proxy_pass $users_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback — all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
