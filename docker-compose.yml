services:
  frontend:
    build:
      context: .
      args:
        ENVIRONMENT: ${ENVIRONMENT:-prod}
    image: eras-frontend:${ENVIRONMENT:-prod}
    container_name: eras-frontend-${ENVIRONMENT:-prod}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped
    networks:
      - eras-network

networks:
  eras-network:
    external: true
    